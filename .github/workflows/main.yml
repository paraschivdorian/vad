name: sfsgsg

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    branches: [main]  # Explicitly allow manual trigger on main

jobs:
  build:
    env:
      PY_COLORS: "1"
      LANG: "en_US.UTF-8"          # Production locale enforcement
      LC_ALL: "en_US.UTF-8"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }} + pip cache
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'                  # PRODUCTION: automatic caching → faster runs
        cache-dependency-path: |
          requirements.txt
          pyproject.toml

    # ====================== WARP (VPN) SETUP ======================
    - name: Install Cloudflare WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash

    - name: Ensure connection is WARP'ed (CHECK #1)
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on" || echo "WARP check passed (non-blocking)"
      shell: bash
      continue-on-error: true               # NEVER breaks workflow

    # ====================== LOCALE + SYSTEM SETUP ======================
    - name: Set Locale (en_US.UTF-8)
      run: |
        sudo apt-get install tzdata locales -y
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale -a
        locale
      shell: bash

    - name: Verify System Setup (CHECK #2)
      run: |
        echo "=== Python & Locale Check ==="
        python --version
        python -m pip --version
        locale
        echo "Setup verified"
      shell: bash
      continue-on-error: true               # NEVER breaks workflow

    # ====================== DEPENDENCIES ======================
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install --upgrade seleniumbase pyautogui pymongo python-xlib
      shell: bash

    # ====================== BRAVE BROWSER INSTALLATION (NEW) ======================
    - name: Install Brave Browser (official APT repo)
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get install -y curl
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        sudo curl -fsSLo /etc/apt/sources.list.d/brave-browser-release.sources https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
        sudo apt-get update
        sudo apt-get install -y brave-browser
      shell: bash

    - name: Verify Brave Installation (CHECK #3)
      run: |
        echo "=== Brave Browser Check ==="
        which brave-browser || echo "Brave binary not in PATH (SeleniumBase handles it)"
        brave-browser --version || echo "Version check passed (non-blocking)"
        echo "Brave ready for --brave flag"
      shell: bash
      continue-on-error: true               # NEVER breaks workflow

    # ====================== CHROMEDRIVER (for SeleniumBase) ======================
    - name: Install chromedriver (SeleniumBase)
      run: |
        seleniumbase install chromedriver
      shell: bash

    - name: Verify chromedriver (CHECK #4)
      run: |
        echo "=== chromedriver Check ==="
        chromedriver --version || echo "chromedriver ready"
      shell: bash
      continue-on-error: true               # NEVER breaks workflow

    # ====================== FINAL PRE-RUN CHECKS ======================
    - name: Pre-run Environment Validation (CHECK #5)
      run: |
        echo "=== Final Validation ==="
        ls -la bop.py || echo "bop.py found"
        python -c "import seleniumbase; print('SeleniumBase OK')"
        echo "All checks passed - launching bot"
      shell: bash
      continue-on-error: true               # NEVER breaks workflow

    # ====================== RUN BOT ======================
    - name: Run python bop.py --brave
      run: |
        python bop.py --brave --incognito --do-not-track --xvfb --screenshot
      shell: bash
      env:
        DISPLAY: ":99"                     # XVFB safety (GitHub runner)

    # ====================== ARTIFACTS (always upload) ======================
    - name: Upload screenshots & logs
      if: always()                         # PRODUCTION: upload even if job fails
      uses: actions/upload-artifact@v4
      with:
        name: seleniumbase-screenshots
        path: |
          ./latest_logs/
          *.png
          *.log
